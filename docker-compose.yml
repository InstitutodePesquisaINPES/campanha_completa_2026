version: '3.8'

services:
  # 🗄️ Banco de Dados Principal
  postgres:
    image: postgres:16-alpine
    container_name: kiribamba_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kiribamba_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Sistema@1@2@3}
      POSTGRES_DB: ${POSTGRES_DB:-kiribamba}
    volumes:
      - kiribamba_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiribamba_admin -d kiribamba"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ⚡ Cache e Fila em Memória
  redis:
    image: redis:7-alpine
    container_name: kiribamba_redis
    restart: always
    volumes:
      - kiribamba_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🚀 Backend (NestJS API)
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: kiribamba_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-kiribamba_admin}:${POSTGRES_PASSWORD:-Sistema@1@2@3}@postgres:5432/${POSTGRES_DB:-kiribamba}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-Sistema@1@2@3}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7d}
    volumes:
      - kiribamba_uploads:/app/uploads

  # 💻 Frontend (React PWA + Nginx)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: kiribamba_web
    restart: always
    depends_on:
      - api
    expose:
      - "80"

volumes:
  kiribamba_pgdata:
  kiribamba_redisdata:
  kiribamba_uploads:
